project:
  name: "ADAS ML Platform Mini"

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  splits_data: "data/splits"
  model_output: "artifacts/models/model.pth"
  metrics_output: "artifacts/metrics/metrics.json"
  report_output: "artifacts/reports"

training:
  image_size: 224
  batch_size: 16
  epochs: 5
  learning_rate: 0.001
  num_classes: 3

labels:
  classes:
    - safe
    - caution
    - dangerous